name: Refresh Reviews and Rebuild

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Fetch fresh reviews
        run: node scripts/fetch-reviews.mjs

      - name: Commit updated reviews
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/reviews.json
          git diff --staged --quiet || git commit -m "chore: refresh app store reviews"
          git push
